version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    container_name: sightour-postgres
    environment:
      POSTGRES_USER: sightour
      POSTGRES_PASSWORD: sightour
      POSTGRES_DB: sightour
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sightour -d sightour']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sightour-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sightour-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sightour
      MINIO_ROOT_PASSWORD: sightour
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  miniodata: