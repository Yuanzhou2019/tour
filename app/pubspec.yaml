name: sightour
description: "Sightour — Shanghai travel companion for foreign visitors"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.0.5

  # 路由
  go_router: ^17.3.0

  # 网络
  dio: ^5.7.0

  # 本地存储
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.2.0
  flutter_secure_storage: ^10.3.1

  # 序列化
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # 函数式（Either 用于 Repository 返回值）
  dartz: ^0.10.1

  # 国际化
  intl: ^0.20.0

  # DI
  get_it: ^9.2.1
  injectable: ^3.0.0

  # 日志 / 错误
  logger: ^2.4.0
  sentry_flutter: ^8.5.0

  # 工具
  package_info_plus: ^10.2.0
  shared_preferences: ^2.3.0

  # 地图（高德）
  amap_flutter_map: ^3.0.0
  amap_flutter_location: ^3.0.0

  # UI
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  injectable_generator: ^3.0.2
  integration_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  # assets 在阶段一 Task 6 启用
  # assets:
  #   - assets/i18n/
  #   - assets/images/
  #   - assets/fonts/
  #   - assets/content/
